name: Build & Deploy to cPanel

on:
  push:
    branches: [main]
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  deploy:
    name: Build → FTP Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Set up Node.js (match your local version)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Build static export → generates /out folder
      - name: Build
        run: npm run build

      # 5. Deploy /out contents to cPanel via FTP
      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftps                    # FTPS = FTP over SSL (cPanel default)
          local-dir: ./out/                 # what to upload
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}  # e.g. /public_html/
          dangerous-clean-slate: false      # don't wipe server on every deploy
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
